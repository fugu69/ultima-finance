name: CI/CD Production Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      repo_lower: ${{ steps.set-repo.outputs.repo_lower }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository name to lowercase
        id: set-repo
        run: echo "repo_lower=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.set-repo.outputs.repo_lower }}/ultima_web:${{ github.sha }}
            ghcr.io/${{ steps.set-repo.outputs.repo_lower }}/ultima_web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Execute deployment commands via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          cat <<EOF > ~/.ssh/config
          Host ultima-prod
            HostName $SERVER_HOST
            User $SERVER_USER
            IdentityFile ~/.ssh/deploy_key
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

          ssh ultima-prod << EOF_SSH
            set -e 
            
            echo "--- Переход в папку проекта ---"
            cd /home/dima/ultima-finance
            
            echo "--- Создание бэкапа базы данных ---"
            docker compose exec -T ultima_backup backup
            
            echo "--- Обновление docker-compose.yml из репозитория ---"
            git pull origin main
            
            echo "--- Скачивание нового образа из GHCR ---"
            export DOCKER_IMAGE="ghcr.io/${{ needs.build-and-push.outputs.repo_lower }}/ultima_web:${{ github.sha }}"
            docker compose pull ultima_web
            
            echo "--- Перезапуск контейнеров (с новыми тегами) ---"
            docker compose up -d ultima_web ultima_nginx ultima_tunnel
            
            echo "--- Очистка старых образов для освобождения диска ---"
            docker image prune -f
          EOF_SSH