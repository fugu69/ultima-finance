<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доступ запрещен | Ultima-Finance</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full space-y-6 bg-white border border-gray-200 p-8 rounded-2xl shadow-sm text-center">
            
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-slate-100 border border-slate-200">
                <svg class="h-6 w-6 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m0 0v2m0-2h2m-2 0H10m11 4a9 9 0 11-18 0 9 9 0 0118 0zM12 5V3m0 2V3m0 2h2m-2 0H10" />
                </svg>
            </div>

            <div class="space-y-2">
                <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Доступ запрещен (403)</h2>
                <p class="text-sm text-gray-500 leading-relaxed">
                    У вас нет прав для просмотра этой страницы, или возникла ошибка безопасности (например, истек срок действия CSRF-токена).
                </p>
            </div>

            <div class="pt-2">
                <a href="/" class="inline-flex w-full justify-center py-3 px-4 text-sm font-medium rounded-full text-white bg-gray-950 hover:bg-gray-800 transition duration-150 ease-in-out">
                    Вернуться на главную
                </a>
            </div>

        </div>
    </div>
</body>
</html>
