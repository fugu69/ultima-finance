{% extends "base.html" %}

{% block title %}Инструкции отправлены{% endblock title %}

{% block content %}
<div class="min-h-[calc(100vh-73px)] flex items-center justify-center bg-gray-50 px-4 py-12">
    <div class="max-w-md w-full space-y-6 bg-white border border-gray-200 p-8 rounded-2xl shadow-sm text-center">
        
        <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-50 border border-green-100">
            <svg class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <div class="space-y-2">
            <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Проверьте почту</h2>
            <p class="text-sm text-gray-500 leading-relaxed">
                Мы отправили вам письмо с инструкциями по установке нового пароля. Если письмо не пришло, проверьте папку «Спам».
            </p>
        </div>

        <div class="pt-2">
            <a href="{% url 'login' %}" class="inline-flex w-full justify-center py-3 px-4 text-sm font-medium rounded-full text-gray-700 bg-gray-100 hover:bg-gray-200 transition duration-150 ease-in-out">
                Вернуться к логину
            </a>
        </div>

    </div>
</div>
{% endblock content %}
