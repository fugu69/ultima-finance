<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка сервера | Ultima-Finance</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full space-y-6 bg-white border border-gray-200 p-8 rounded-2xl shadow-sm text-center">
            
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-amber-50 border border-amber-100">
                <span class="text-lg font-bold text-amber-600">500</span>

                <p class="text-sm text-gray-500 leading-relaxed">

                </p>
            </div>

            <div class="pt-2">
                <a href="/" class="inline-flex w-full justify-center py-3 px-4 text-sm font-medium rounded-full text-white bg-gray-950 hover:bg-gray-800 transition duration-150 ease-in-out">
                    Попробовать снова
                </a>
            </div>

        </div>
    </div>
