{% extends "base.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[80vh] px-4">
    
    <div class="max-w-md w-full bg-white border border-gray-200 rounded-2xl shadow-sm p-8 text-center">
        
        <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight mb-3">
            Ultima Finance
        </h1>
        
        <p class="text-gray-500 text-base mb-8">
            Простая и быстрая система учета личных продаж для менеджеров. Контролируйте свои сделки и комментарии в одном месте.
        </p>
        
        <div class="space-y-3">
            <a href="{% url 'login' %}" 
               class="block w-full bg-gray-950 hover:bg-gray-800 text-white font-medium py-3 px-4 rounded-xl transition duration-150 ease-in-out">
                Войти в кабинет
            </a>
            
            <a href="{% url 'signup' %}" 
               class="block w-full bg-gray-50 hover:bg-gray-100 text-gray-700 font-medium py-3 px-4 rounded-xl border border-gray-200 transition duration-150 ease-in-out">
                Создать аккаунт
            </a>
        </div>
        
    </div>

    <p class="text-xs text-gray-400 mt-6">
        &copy; 2026 Ultima Project. Built with Django & Tailwind.
    </p>
</div>
{% endblock content %}
